# Auto-check on every proposed change: generate code, make sure it compiles
# (no errors) and that all tests pass — before it can go live. Inherited style
# nits are reported but don't block (only real breakage does).
name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      # Fail only on real errors, not the repo's inherited warnings/infos.
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - run: flutter test

  # Analyze/test alone let an AGP bump break Android builds unnoticed
  # (2026-07-16); a real compile is the only signal for Gradle-side changes.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug
